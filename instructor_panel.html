<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Panel</title>
    <link rel="stylesheet" href="css/instructor_panel.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        if (!localStorage.getItem('instructor_id')) {
            window.location.replace('index.html');
        }
    </script>
</head>
<body>
<nav class="navbar">
    <div class="user-block">
        <h2 id="instructor-name">Yuklanmoqda...</h2>
        <div class="online-status"><span class="green-dot"></span> Online</div>
    </div>
    <div class="nav-actions">
        <button onclick="location.reload()" class="btn-refresh">Yangilash</button>
        <button onclick="logout()" class="btn-logout">Chiqish</button>
    </div>
</nav>

<main class="content">
    <section id="scanner-section" class="panel-section">
        <div id="reader"></div>
        <p class="scan-hint">O'quvchi chekidagi QR kodni ramka ichiga keltiring</p>
    </section>

    <section id="customer-card" class="panel-section" style="display:none;">
        <div class="card">
            <h3>QR Kod Ma'lumotlari</h3>
            <div class="info-grid" id="ticket-data">
                <p><strong>ID:</strong> <span id="c-id"></span></p>
                <p><strong>Ism:</strong> <span id="c-name"></span></p>
                <p><strong>Markaz:</strong> <span id="c-center"></span></p>
                <p><strong>Kurs:</strong> <span id="c-type"></span></p>
                <p><strong>Summa:</strong> <span id="c-sum"></span> so'm</p>
            </div>
            <button id="start-lesson-btn" class="btn-start">Mashg'ulotni boshlash</button>
        </div>
    </section>

    <section id="reports-section" class="panel-section" style="display:none;">
        <h3>Mening Hisobotim</h3>
        <div class="stats-container">
            <div class="stat-item">Kunlik: <b id="d-money">0</b> so'm</div>
            <div class="stat-item">Oylik: <b id="m-money">0</b> so'm</div>
        </div>
    </section>

    <section id="customers-section" class="panel-section" style="display:none;">
        <h3>Mijozlar ro'yxati</h3>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>№</th><th>Mijoz</th><th>Vaqt</th></tr></thead>
                <tbody id="customers-body"></tbody>
            </table>
        </div>
    </section>
</main>

<footer class="bottom-nav">
    <button onclick="showSection('scanner-section')">📷 Skaner</button>
    <button onclick="showSection('reports-section'); loadReports();">📊 Hisobot</button>
    <button onclick="showSection('customers-section'); loadCustomerList();">👥 Mijozlar</button>
</footer>

<script src="js/instructor_panel.js"></script>
</body>
</html>
